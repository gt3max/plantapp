name: plantapp
description: "PlantApp — Smart Plant Care. Why guess when you can measure?"
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  # Icons
  cupertino_icons: ^1.0.8

  # Navigation
  go_router: ^14.0.0

  # HTTP
  dio: ^5.4.0
  http: ^1.2.0

  # State management
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.0

  # Storage
  flutter_secure_storage: ^9.2.0
  shared_preferences: ^2.2.0

  # Camera & Images
  camera: ^0.11.0
  image_picker: ^1.1.0
  image: ^4.2.0

  # Location
  geolocator: ^12.0.0
  geocoding: ^3.0.0

  # Notifications
  flutter_local_notifications: ^17.2.0

  # File system
  path_provider: ^2.1.0

  # URL launcher
  url_launcher: ^6.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
